  expo-audio: ~57.0.0
  expo-blur: ~57.0.0
  expo-calendar: ~57.0.0
  expo-camera: ~57.0.0
  expo-contacts: ~57.0.0
  expo-file-system: ~57.0.0
  expo-haptics: ~57.0.0
  expo-image: ~57.0.0
